name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major
concurrency:
  group: release
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build-binaries:
    name: Binary ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4 # Depot Ubuntu 22.04, 4 CPUs, 16 GB RAM
            build_command: nix build -L .#binary-gnosis_vpn-x86_64-linux
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4 # Depot Ubuntu 22.04 ARM, 4 CPUs, 16 GB RAM
            build_command: nix build -L .#binary-gnosis_vpn-aarch64-linux
          - architecture: aarch64-darwin
            runner: depot-macos-15 # Depot Apple Silicon M2, 8 CPUs, 24 GB RAM, 400 GB SSD
            build_command: nix build -L .#binary-gnosis_vpn-aarch64-darwin
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@eedb4b7701714299852ca5243f1544b817653f33 # build-binaries-v3
    permissions:
      contents: read
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      architecture: ${{ matrix.architecture }}
      cachix_cache_name: gnosis-vpn-client
      build_command: ${{ matrix.build_command }}
      binary: gnosis_vpn-client
      runner: ${{ matrix.runner }}
      timeout_minutes: 240
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY }}
      gpg_private_key_password: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD }}
      apple_certificate: ${{ secrets.APPLE_CERTIFICATE_DEVELOPER_P12_BASE64 }}
      apple_certificate_password: ${{ secrets.APPLE_CERTIFICATE_DEVELOPER_PASSWORD }}
  update-client-version:
    name: Update client version
    needs:
      - build-binaries
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Resolve build version
        id: version
        shell: bash
        run: |
          current_version=$(grep -E '^version\s*=' Cargo.toml | head -n1 | awk -F\" '{print $2}')
          echo "Resolved build version: ${current_version}"
          echo "build_version=${current_version}" >> "$GITHUB_OUTPUT"
      - name: Generate GitHub App token
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          owner: gnosis
      - name: Update GNOSISVPN_CLIENT_LATEST_VERSION in gnosis/gnosis_vpn
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.build_version }}
        run: |
          gh variable set GNOSISVPN_CLIENT_LATEST_VERSION --repo gnosis/gnosis_vpn --body "$VERSION"
  release:
    name: Close release
    needs:
      - build-binaries
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@eedb4b7701714299852ca5243f1544b817653f33 # hoprnet/hopr-workflows 0.11.1
        with:
          source_branch: ${{ github.ref_name }}
          file: Cargo.toml
          release_type: ${{ inputs.release_type }}
          cachix_cache_name: gnosis-vpn-client
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: GnosisVPN
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          gcp_artifact_package: gnosis_vpn-client
          github_app_private_key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          github_app_client_id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
