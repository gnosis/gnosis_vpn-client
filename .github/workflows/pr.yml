name: PR
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
concurrency:
  group: ${{ github.ref }}-pr
  cancel-in-progress: true
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  build-binaries:
    name: Binary ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4 # Depot Ubuntu 22.04, 4 CPUs, 16 GB RAM
            build_command: nix build -L .#binary-gnosis_vpn-x86_64-linux
            build_debug_command: nix build -L .#binary-gnosis_vpn-x86_64-linux-dev
            required_label: ""
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4 # Depot Ubuntu 22.04 ARM, 4 CPUs, 16 GB RAM
            build_command: nix build -L .#binary-gnosis_vpn-aarch64-linux
            build_debug_command: nix build -L .#binary-gnosis_vpn-aarch64-linux-dev
            required_label: "binary:aarch64-linux"
          - architecture: aarch64-darwin
            runner: depot-macos-15 # Depot Apple Silicon M2, 8 CPUs, 24 GB RAM, 400 GB SSD
            build_command: nix build -L .#binary-gnosis_vpn-aarch64-darwin
            build_debug_command: nix build -L .#binary-gnosis_vpn-aarch64-darwin-dev
            required_label: "binary:aarch64-darwin"
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # build-binaries-v3.1.1
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    permissions:
      contents: read
      id-token: write
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      version_type: commit
      architecture: ${{ matrix.architecture }}
      cachix_cache_name: gnosis-vpn-client
      build_command: ${{ matrix.build_command }}
      build_debug_command: ${{ matrix.build_debug_command }}
      binary: gnosis_vpn-client
      gcp_workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
      gcp_service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
      runner: ${{ matrix.runner }}
      timeout_minutes: 240
      enabled: ${{ matrix.required_label == '' || contains(github.event.pull_request.labels.*.name, matrix.required_label) }}
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY }}
      gpg_private_key_password: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD }}
      apple_certificate: ${{ secrets.APPLE_CERTIFICATE_DEVELOPER_P12_BASE64 }}
      apple_certificate_password: ${{ secrets.APPLE_CERTIFICATE_DEVELOPER_PASSWORD }}
  checks:
    name: Checks
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    runs-on: depot-ubuntu-22.04-4
    steps:
      - name: Run checks
        uses: hoprnet/hopr-workflows/actions/nix-action@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # nix-action-v1.1.3
        with:
          source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
          cachix_cache_name: gnosis-vpn-client
          cachix_auth_token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          command: nix flake check -L --show-trace --max-jobs 1
  system-test:
    name: System tests
    # NOTE: Do not switch to a depot runner here. The system-test recipe requires passwordless
    # sudo (for useradd, chown, etc.). Depot containers restrict these syscalls even for root.
    # Standard GitHub-hosted runners support passwordless sudo for all commands out of the box.
    runs-on: ubuntu-22.04
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    permissions:
      contents: read
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # setup-nix-v2.0.2
        with:
          cachix_cache_name: gnosis-vpn-client
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run offline smoke-test suite
        run: nix develop -c just smoke-test-check
      - name: Build binaries and system test
        run: |
          nix build .#binary-gnosis_vpn-system_tests
      - name: Run the system test
        env:
          SYSTEM_TEST_HOPRD_ID: ${{ secrets.SYSTEM_TEST_HOPRD_ID }}
          SYSTEM_TEST_HOPRD_ID_PASSWORD: ${{ secrets.SYSTEM_TEST_HOPRD_ID_PASSWORD }}
          SYSTEM_TEST_SAFE: ${{ secrets.SYSTEM_TEST_SAFE }}
          SYSTEM_TEST_CONFIG: ${{ secrets.SYSTEM_TEST_CONFIG}}
          SYSTEM_TEST_WORKER_BINARY: ${{ github.workspace }}/result/bin/gnosis_vpn-worker
        run: nix develop -c just system-tests ${{ github.workspace }}/result/bin/gnosis_vpn-system_tests
