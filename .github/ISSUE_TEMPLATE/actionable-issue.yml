name: Actionable Issue
description: Track work promoted from a Discussion.
labels: ["actionable", "triage"]
body:
  - type: input
    id: discussion_ref
    attributes:
      label: Discussion Reference
      description: Link to the original discussion for context.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Concise summary of the required work.
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: List of specific implementation steps.
      placeholder: "- [ ] Task 1"
