###
# Gnosis VPN service configuration file
#
# On Unix the default config path is `/etc/gnosisvpn/config.toml`
# However, you can override this by using the `GNOSISVPN_CONFIG_PATH` environment variable.
###

# general config file version
version = 6

###
## destinations section - configure available target destinations

[destinations]

# identifier for a destination and its routing options
# [destinations.<id>]
# exit node address (where the connection should terminate)
# address = "<exit node address>"
# additional information about this exit node
# meta = { location = <location> }
# session path — two forms are supported:
#   hop-count routing: the HOPR path planner selects relays automatically
#   path = { hops = 1 }
#   explicit path: specify between 1 and 3 relay nodes by their chain addresses in order
#   path = { intermediates = ["0x<relay1>", "0x<relay2>", "0x<relay3>"] }

[destinations.Germany]
address = "0xD9c11f07BfBC1914877d7395459223aFF9Dc2739"
meta    = { location = "Germany" }
path    = { hops = 1 }

[destinations.USA]
address = "0xa5Ca174Ef94403d6162a969341a61baeA48F57F8"
meta    = { location = "USA" }
path    = { hops = 1 }

[destinations.Spain]
address = "0x8a6E6200C9dE8d8F8D9b4c08F86500a2E3Fbf254"
meta    = { location = "Spain" }
path    = { hops = 1 }

###
## connection section - adjust for more fine grained connection control

# [connection]
# http_timeout - specify general HTTP timeouts for internal protocol related requests
# http_timeout = "60s"

# lan_lockdown - when true, the killswitch blocks all local network traffic (192.168.x.x,
# 10.x.x.x, 172.16.x.x, etc.) while the VPN is active. Defaults to false, which lets
# you reach devices on your local network (printers, NAS, etc.) while still routing all
# internet traffic through the VPN.
# lan_lockdown = false

# session_pseudonym_ttl - how long to keep a closed session's pseudonym cached for reuse
# on reconnect. Exit nodes retain session SURBs for ~30s, so reconnecting within this
# window avoids a cold-start SURB exchange. Currently defaults to 1s (effectively
# disabled) until hopr-lib supports PIX; set to "30s" once that lands.
# session_pseudonym_ttl = "30s"

# determine specific connection parameters for ephemeral bridge connection
# [connection.bridge]
# capabilities = [ "segmentation", "retransmission", "retransmission_ack_only", "no_rate_control" ]
# target = "172.30.0.1:8000"

# determine specific connection parameters for persistent main connection
# [connection.wg]
# capabilities = [ "segmentation", "no_delay" ]
# target = "172.30.0.1:51820"

# adjust internal session validation ping settings
# [connection.ping]
# address = "10.128.0.1"
# timeout = "15s"
# ttl = 6
# seq_count = 3

# adjust health check intervals
# ping runs every cycle, health and version piggyback every Nth cycle
# [connection.health_check_intervals]
# ping = "15s"
# health_every_n_pings = 4  # minimum 1
# version_every_n_pings = 20  # minimum 1
# ICMP ping probe interval when connected (verifies tunnel is working)
# tunnel_ping = "10s"
# consecutive tunnel ping failures before triggering reconnect
# tunnel_ping_max_failures = 3

# adjust session internal options
# [connection.max_surb_upstream]
# ping = "512 Kb/s"
# main = "16 Mb/s"
#
# [connection.buffer]
# ping = "1 MB"
# main = "10 MB"

###
## wireguard section - specific VPN-related settings

# [wireguard]
# interface listen port for incoming connections; defaults to 51820
# listen_port = 51820
# manually overwrite derived allowed_ips for the WireGuard interface
# allowed_ips = "0.0.0.0/0"
# If you want to disable WireGuard key rotation, provide a static private key here.
# force_private_key = "<your WireGuard private key>"
# overwrite default DNS servers for the WireGuard interface; defaults to Cloudflare and Google DNS
# if overwrite false, does not touch DNS settings at all
# dns = { overwrite = true, servers = "1.1.1.1,8.8.8.8" }

###
## chain provider section - query blockchain settings

# see https://github.com/hoprnet/hoprnet/blob/6525d753fde70b5026d19d7a647b8143352b26df/chain/connector/src/connector/mod.rs#L46 for documentation
# [blokli]
# connection_sync_timeout = "30s"
# sync_tolerance = 50

###
## strategy section - channel lifecycle and funding parameters

# [strategy]
# number of forwarded packets the initial channel stake is sized to cover
# desired_message_count = 1000000
# minimum number of open outgoing channels to maintain
# min_open_channels = 5
# target number of open outgoing channels
# target_open_channels = 8
