[workspace]
members = ["gnosis_vpn", "gnosis_vpn-ctl", "gnosis_vpn-lib"]
resolver = "2"

[workspace.package]
version = "0.10.10"
edition = "2021"
name = "gnosis_vpn"
rust-version = "1.87"
authors = ["HOPR"]
license = "LGPL-3.0"
repository = "https://github.com/gnosis/gnosis_vpn-client"

[workspace.dependencies]
backoff = { version = "0.4" }
bincode = { version = "1.3" }
clap = { version = "4.5", features = ["derive", "env"] }
crossbeam-channel = "0.5"
ctrlc = { version = "3.4", features = ["termination"] }
directories = { version = "5.0" }
exitcode = "1.1"
humantime = "2.2"
humantime-serde = "1.1"
libp2p-identity = { version = "0.2", features = ["ed25519", "peerid"] }
notify = { version = "6.1", features = ["serde"] }
ping = { version = "0.5" }
rand = { version = "0.8" }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = "0.3"
url = { version = "2.5", features = ["serde"] }

talpid-wireguard = { path = "modules/mullvadvpn-app/talpid-wireguard" }

# talpid-wireguard
futures = "0.3.15"
ipnetwork = "0.20"
once_cell = "1.16"
log = "0.4"
chrono = { version = "0.4.26", default-features = false ,features = ["clock"] }
tokio = { version = "1.44", features = ["test-util", "process", "rt-multi-thread", "fs"] }
socket2 = { version = "0.5.7", features = ["all"] }

# talpid-wireguard dev
proptest = "1.4"
windows-sys = "0.52.0"

# tapid wireguard dependencies
tun = { version = "0.5.5", features = ["async"] }
hyper-util = { version = "0.1.8", features = [
  "client",
  "client-legacy",
  "http2",
  "http1",
] }
prost = "0.13.3"
sha2 = "0.10"
tonic = "0.12.3"
tonic-build = { version = "0.10.0", default-features = false }
tower = { version = "0.5.1", features = ["util"] }
shadowsocks = "1.20.3"
anyhow = "1.0"
env_logger = "0.11.7"

gnosis_vpn-lib = { path = "gnosis_vpn-lib" }

[workspace.lints]
