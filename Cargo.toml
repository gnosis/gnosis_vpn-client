[workspace]
members  = ["gnosis_vpn*"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "LGPL-3.0"
version = "0.86.0"

[workspace.metadata.crane]
name = "gnosis_vpn"

[workspace.dependencies]
anyhow = { version = "1.0.100" }
async-trait = "0.1.89"
backon = { version = "1.6.0" }
bytesize = "2.3.0"
cfg-if = "1.0.4"
chrono = { version = "0.4.38", default-features = false, features = [
  "clock",
  "serde",
  "std",
] }
cidr = "0.3.2"
clap = { version = "4.5.57", features = ["derive", "env"] }
clap_complete = "4"
edgli = { git = "https://github.com/hoprnet/edge-client.git", rev = "7b010b9d6ced8c0a423ca2c5c4e6cdfdb5243446", features = [
  "telemetry",
] }
exitcode = "1.1.2"
futures = "0.3.31"
futures-util = "0.3.31"
hopr-utils-session = { git = "https://github.com/hoprnet/hoprnet", rev = "37d2a1cc14", features = [
  "runtime-tokio",
] }
human-bandwidth = "0.1.4"
humantime = "2.3.0"
humantime-serde = "1.1.1"
ipnetwork = "0.21"
libc = "0.2.183"
mnl = "0.3.1"
multiaddr = "0.18.2"
nftnl = "0.9.1"
notify = "8.2.0"
pfctl = "0.7.0"
pgp = "0.14"
ping = "0.7.0"
rand = "0.10.0"
reqwest = { version = "0.13.1", features = ["blocking", "json"] }
rtnetlink = "0.20.0"
serde = { version = "1.0.228", features = ["derive"] }
serde-saphyr = "0.0.25"
serde_json = "1.0.148"
serde_with = "3.16.1"
thiserror = "2.0.18"
tikv-jemallocator = "0.6"
tokio = { version = "1.52.3", features = ["full"] }
tokio-util = { version = "0.7.17", features = ["rt"] }
toml = "1.0.2"
tracing = { version = "0.1.44", features = ["release_max_level_debug"] }
tracing-subscriber = "0.3.22"
url = { version = "2.5.7", features = ["serde"] }
uzers = "0.12.2"

objc2            = "0.6"
objc2-foundation = { version = "0.3", features = ["NSProcessInfo", "NSString"] }

gnosis_vpn-lib = { path = "gnosis_vpn-lib" }

# this profile focuses on the best runtime performance and the smallest binary size
[profile.release]
codegen-units = 1
lto           = "fat"
opt-level     = 3
panic         = "abort"
strip         = true
